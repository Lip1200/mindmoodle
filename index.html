        currentAnimal = null;
        feedbackEl.style.display = "none";
        motDuJourEl.textContent = "";
        questionEl.textContent = "Salut 👋 Comment te sens-tu aujourd’hui ?";
        avatarZone.innerHTML =
          '<div class="wbpup-avatar-breath"><div class="wbpup-avatar-anim"><div class="wbpup-avatar-circle">?</div></div></div>';
        panel.style.display = "none";
        choiceZone.style.display = "block";
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (e) {}
      }

      if (changeBtn) {
        changeBtn.addEventListener("click", resetChoice);
      }

      document.querySelectorAll(".wbpup-choicebtn").forEach(btn => {
        btn.addEventListener("click", () => {
          const animal = btn.getAttribute("data-animal");
          applyAnimal(animal);
        });
      });

      document.querySelectorAll("#wbpup-buttons button").forEach(btn => {
        btn.addEventListener("click", () => {
          const mood = btn.getAttribute("data-mood");
          const cfg = animals[currentAnimal];
          let text = "Merci pour ton check-in 💛";
          if (cfg && cfg.moods && cfg.moods[mood]) {
            text = cfg.moods[mood];
          }
          feedbackEl.textContent = text;
          feedbackEl.style.display = "block";
        });
      });

      window.addEventListener("load", () => {
        let saved = null;
        try {
          saved = localStorage.getItem(STORAGE_KEY);
        } catch (e) {}
        if (saved && animals[saved]) {
          applyAnimal(saved);
        } else {
          resetChoice();
        }
      });
    })();
  </script>
</p>
